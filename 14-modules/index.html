<!DOCTYPE html>
<!--
  MODULE 14: JS Modules Demo
  Note: type="module" enables import/export. Because of browser
  security (CORS), this must be served via a local dev server
  (e.g. VS Code "Live Server" extension) rather than opened as file://
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Modules Practice</title>
</head>
<body>
  <button id="load-btn">Dynamically Import a Module</button>
  <p>Open the console to see the output.</p>
  <script type="module" src="app.js"></script>
</body>
</html>
