<!DOCTYPE html>
<!--
  MODULE 4: The DOM - Mini Practice Project ("Task Tracker")
  Demonstrates: selecting elements, creating elements, inserting/removing
  nodes, event listeners, event delegation, toggling classes, dataset use.
  Open this file directly in a browser to try it.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Tracker - DOM Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Task Tracker</h1>
    <form id="task-form">
      <input type="text" id="task-input" placeholder="Add a new task..." required />
      <button type="submit">Add</button>
    </form>
    <ul id="task-list"></ul>
    <p id="empty-message">No tasks yet - add one above!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
